<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPSA News & Events</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="css/globals.css?v=7">
  <link rel="stylesheet" href="css/home.css?v=7">
  <link rel="stylesheet" href="css/news.css?v=1">
</head>
<body class="news-page-body">
  <div class="toast-container" id="toastContainer"></div>

  <header class="news-page-hero">
    <div class="container news-page-hero-inner">
      <a href="index.html" class="news-back-link">← Back to EPSA Home</a>
      <div class="news-page-kicker">Public Updates Hub</div>
      <h1>News, Events & Announcements</h1>
      <p>Follow everything EPSA is publishing, open the full story, and catch up on recent national activity in one place.</p>
    </div>
  </header>

  <main class="container news-page-layout">
    <section class="news-spotlight-shell">
      <div id="newsDetailPanel" class="news-detail-panel">
        <div class="news-detail-empty">Loading the latest EPSA update...</div>
      </div>
    </section>

    <section class="news-archive-shell">
      <div class="news-archive-header">
        <div>
          <div class="section-label">Archive</div>
          <h2>All Updates</h2>
        </div>
      </div>
      <div id="newsArchiveGrid" class="news-archive-grid">
        <div class="news-detail-empty">Loading updates...</div>
      </div>
    </section>
  </main>

  <script src="js/api.js?v=7"></script>
  <script src="js/news.js?v=1"></script>
</body>
</html>
